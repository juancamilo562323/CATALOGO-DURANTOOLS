<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;}

body{
  background:#6b6b6b;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:28px;
  padding:50px 20px 60px;
  font-family:'Roboto',sans-serif;
}
.page{
  width:210mm;height:297mm;page-break-after:always;break-after:page;
  background:#fff;
  box-shadow:0 0 0 1px rgba(0,0,0,.15),0 4px 16px rgba(0,0,0,.25),0 20px 60px rgba(0,0,0,.35);
  display:flex;flex-direction:column;overflow:hidden;
}
.header{background:#1c1c1c;flex-shrink:0;}
.hazard-stripe{
  height:10px;
  background:repeating-linear-gradient(-55deg,#F5A623 0,#F5A623 10px,#1c1c1c 10px,#1c1c1c 20px);
}
.header-content{
  display:flex;align-items:center;
  padding:11px 16px;gap:14px;
}
.logo-area{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-badge{
  width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.brand-text .name{
  font-family:'Oswald',sans-serif;font-size:14.5px;font-weight:700;
  letter-spacing:.01em;text-transform:uppercase;white-space:nowrap;
}
.brand-text .name .duran{color:#F5A623;}
.brand-text .name .tools{color:#fff;}
.brand-text .tagline{font-size:6.5px;color:#999;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;font-weight:500;white-space:nowrap;}
.header-divider{width:1px;align-self:stretch;background:rgba(255,255,255,.2);flex-shrink:0;}
.catalog-title{
  flex:1;font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;
  color:#fff;letter-spacing:.05em;text-transform:uppercase;
}
.year-pill{
  background:#F5A623;color:#1c1c1c;
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:10px;padding:4px 12px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;
}
.grid-area{
  flex:1;padding:7px;background:#dedad4;
  display:flex;min-height:0;
}
.grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 2px; background: #a09b93; border-radius: 4px; overflow: hidden; border: 2px solid #a09b93; height: 100%; }
.card{
  background:#fff;display:flex;flex-direction:column;
  overflow:hidden;transition:all .18s ease;
}
.card:hover{z-index:3;transform:scale(1.018);box-shadow:0 8px 28px rgba(0,0,0,.22);}
.img-zone{
  flex:1;position:relative;
  background:#f8f7f5;border-bottom:1px solid #ececec;
  display:flex;align-items:center;justify-content:center;
  padding:10px;min-height:0;overflow:hidden;
}
.img-zone img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; color: transparent; }
.sku{
  position:absolute;top:6px;left:6px;
  background:#1c1c1c;color:#F5A623;
  font-family:'Oswald',sans-serif;font-size:8.5px;font-weight:600;
  padding:2px 6px;border-radius:2px;letter-spacing:.06em;z-index:1;
}
.card-body{
  flex-shrink:0;padding:7px 9px 0;
  display:flex;flex-direction:column;gap:4px;
}
.prod-name{
  font-family:'Oswald',sans-serif;font-weight:500;
  font-size:10.5px;color:#1c1c1c;line-height:1.35;
  white-space:pre-line;
}
.dash-line{
  height:1px;
  background:#e2dfd9;
}
.meta-row{display:flex;align-items:center;gap:4px;font-size:9px;}
.lbl{color:#aaa;font-weight:300;}
.val{color:#333;font-weight:500;}
.price-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0 7px;margin:0 -9px 0;
}
.price-left{display:flex;align-items:center;gap:5px;padding-left:9px;}
.cart-icon{font-size:12px;line-height:1;color:#8a8a8a;}
.price-lbl{font-size:7.2px;color:#bbb;letter-spacing:.1em;text-transform:uppercase;font-weight:500;}
.price-num{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:15.5px;color:#1c1c1c;
  background:#F5A623;padding:5px 11px 5px 17px;
  clip-path:polygon(10px 0,100% 0,100% 100%,0 100%);
}
.footer{
  background:#fff;
  padding:12px 40px;display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.footer-line{flex:1;height:1px;background:#d4d1cb;}
.footer-text{font-size:7.5px;color:#999;letter-spacing:.12em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
.footer-text strong{color:#F5A623;font-weight:700;}

/* --- CORRECCIÓN DEFINITIVA PARA PRODUCTOS SIN IMAGEN --- */

/* Recuadro interno gris cuando no hay foto */
.sin-foto-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: #a5a5a5;
    gap: 2px;
}
.sin-foto-icono {
    font-size: 20px; /* Tamaño del emoticón de cámara */
}
.sin-foto-texto {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.sin-foto-url {
    font-size: 6.5px;
    color: #c0392b;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    margin-top: 1px;
}

/* ── Etiqueta de categoría en tarjeta ── */
.cat-badge{
  position:absolute;top:6px;right:6px;
  background:#F5A623;color:#1c1c1c;
  font-family:'Oswald',sans-serif;font-size:6.5px;font-weight:700;
  padding:2px 6px;border-radius:2px;letter-spacing:.05em;
  text-transform:uppercase;z-index:1;max-width:90px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
/* ── Separador de sección entre categorías ── */
.section-divider{
  flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:5px 10px 4px;
  background:#fff;
  border-bottom:1px solid #e8e4de;
}
.section-divider .orden-pill{
  background:#F5A623;color:#1c1c1c;
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:9px;padding:2px 8px;border-radius:3px;flex-shrink:0;
  letter-spacing:.06em;text-transform:uppercase;
}
.section-divider .cat-name{
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:9px;color:#555;letter-spacing:.05em;text-transform:uppercase;
}

/* Forzar a que la zona de la imagen sea la que se adapte y reduzca su tamaño */
.img-zone {
    flex: 1 !important;
    min-height: 0 !important;
}
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;color-adjust:exact !important;}
  body{background:#fff;padding:0;display:block;}
  .page{box-shadow:none;width:210mm;height:297mm;margin:0;page-break-after:always;break-after:page;}
  .page:last-of-type{page-break-after:auto;break-after:auto;}
}
@media print {
    .no-print { display: none !important; }
  }


/* ── Botón exportar PDF ── */
#btn-exportar-pdf {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 9999;
  background: #F5A623;
  color: #1c1c1c;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .06em;
  padding: 14px 26px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,.35);
  display: none;
  align-items: center;
  gap: 10px;
  transition: background .15s, transform .1s;
}
#btn-exportar-pdf:hover { background: #e09410; transform: translateY(-2px); }
#btn-exportar-pdf:active { transform: scale(.97); }
#pdf-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: rgba(28,28,28,.82);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
  font-family: 'Oswald', sans-serif; color: #fff;
}
#pdf-overlay.visible { display: flex; }
#pdf-progress-bar-wrap {
  width: 320px; height: 10px;
  background: rgba(255,255,255,.15);
  border-radius: 5px; overflow: hidden;
}
#pdf-progress-bar {
  height: 100%; width: 0%;
  background: #F5A623;
  border-radius: 5px;
  transition: width .2s;
}
#pdf-status { font-size: 14px; color: #ccc; letter-spacing:.05em; }
</style>

  <div class="no-print" style="background: #fff; padding: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <label style="font-family: 'Oswald', sans-serif; font-size: 16px; margin-right: 10px;">
        Cargar base de productos CSV: 
    </label>
    <input type="file" id="csvFileInput" accept=".csv">
  </div>
  <div class="grid-area">
    <div class="grid">
      <!-- Los productos se cargarán aquí -->
    </div>
  </div>
  <div class="footer">
    <span class="footer-line"></span>
    <span class="footer-text"><strong>DURANTOOLS</strong> Herramientas a tu alcance</span>
    <span class="footer-line"></span>
  </div>
</div>
<script>
const PRODUCTOS_POR_PAGINA = 9;
let csvDataGlobal = null;

function escaparHTML(valor) {
  return String(valor ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function parsearCSVRobusto(linea, sep) {
  const columnas = [];
  let actual = '';
  let dentroDeComillas = false;
  for (let i = 0; i < linea.length; i++) {
    const c = linea[i];
    if (c === '"') {
      if (dentroDeComillas && linea[i+1] === '"') { actual += '"'; i++; }
      else { dentroDeComillas = !dentroDeComillas; }
    } else if (c === sep && !dentroDeComillas) {
      columnas.push(actual); actual = '';
    } else { actual += c; }
  }
  columnas.push(actual);
  return columnas;
}

function normalizarUrlImagen(raw) {
  let url = (raw || '').trim().replace(/^["']|["']$/g, '').trim();
  if (!url) return '';
  let gdrive = url.match(/drive\.google\.com\/file\/d\/([^/]+)/) || url.match(/[?&]id=([^&]+)/);
  if (url.includes('drive.google.com') && gdrive) return `https://drive.google.com/uc?export=view&id=${gdrive[1]}`;
  if (url.includes('dropbox.com')) { url = url.replace('?dl=0','?raw=1').replace('?dl=1','?raw=1'); if (!url.includes('raw=1')) url += (url.includes('?') ? '&' : '?') + 'raw=1'; }
  if (url.startsWith('//')) url = 'https:' + url;
  else if (/^www\./i.test(url)) url = 'https://' + url;
  return url;
}

function manejarErrorImagen(img) {
  img.style.display = 'none';
  const urlIntentada = img.getAttribute('data-url-original') || img.src;
  const box = document.createElement('div');
  box.className = 'sin-foto-box';
  box.innerHTML = `<span class="sin-foto-icono">📷</span><span class="sin-foto-texto">Error Link</span><span class="sin-foto-url" title="${escaparHTML(urlIntentada)}">${escaparHTML(urlIntentada)}</span>`;
  if (img.parentElement) img.parentElement.appendChild(box);
}

function crearTarjetaProducto(p) {
  let url = normalizarUrlImagen(p.imagenUrl);
  let imgHTML = url && (url.toLowerCase().startsWith('http') || url.startsWith('data:image'))
    ? `<img src="${url}" referrerpolicy="no-referrer" data-url-original="${escaparHTML(url)}" onerror="manejarErrorImagen(this)">`
    : `<div class="sin-foto-box"><span class="sin-foto-icono">📷</span><span class="sin-foto-texto">Sin Imagen</span></div>`;
  const catLabel = p.categoria || (p._ordenResuelto && NOMBRES_CATS[p._ordenResuelto]) || p._ordenResuelto || '';
  const catBadge = catLabel ? `<span class="cat-badge">${escaparHTML(catLabel)}</span>` : '';
  return `
    <div class="card">
      <div class="img-zone"><span class="sku"># ${escaparHTML(p.referencia || p.id)}</span>${catBadge}${imgHTML}</div>
      <div class="card-body">
        <div class="prod-name">${escaparHTML(p.nombre)}</div>
        <div class="meta-row"><span class="lbl">Ref:</span> <span class="val">${escaparHTML(p.referencia)}</span></div>
        <div class="dash-line"></div>
        ${_precioKeyActual === '__SIN_PRECIO__' ? '' : `<div class="price-strip"><div class="price-left"><span class="cart-icon">🛒</span><div class="price-lbl">PRECIO</div></div><div class="price-num">$ ${escaparHTML(p.precio)}</div></div>`}
      </div>
    </div>`;
}

function crearTarjetaVacia() {
  return `<div class="card" style="background:#f8f7f5;opacity:0.3;"><div class="img-zone">📦</div><div class="card-body"></div></div>`;
}

// ── LOGO HTML reutilizable ──────────────────────────────────────────
function logoHTML() {
  return document.querySelector('.logo-badge').outerHTML;
}

// ── PASO 1: leer CSV y mostrar selector de precio ──────────────────
function leerCSVYMostrarSelector(csvData) {
  csvDataGlobal = csvData;

  const filas = csvData.replace(/^\uFEFF/, '').split(/\r?\n/).filter(f => f.trim() !== '');
  if (filas.length < 1) return;
  const primeraLinea = filas[0];
  const sep = (primeraLinea.match(/;/g)||[]).length > (primeraLinea.match(/,/g)||[]).length ? ';' : ',';
  const encabezados = parsearCSVRobusto(primeraLinea, sep).map(h => h.trim().toLowerCase());

  // Precios disponibles en el CSV
  const PRECIOS = [
    { label: 'Lista 1',                   key: 'precio1' },
    { label: 'Lista 2',                   key: 'precio2' },
    { label: 'Lista 3',                   key: 'precio3' },
    { label: 'Lista 4',                   key: 'precio4' },
    { label: 'Precio Venta con Impuesto', key: 'precioventa_con_impuesto' },
  ];

  const disponibles = PRECIOS.filter(p => encabezados.some(h => h.includes(p.key)));
  const todosLosPrecios = disponibles.length > 0 ? disponibles : PRECIOS;

  const logoBadge = document.querySelector('.logo-badge').outerHTML;

  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#6b6b6b;
      background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
      background-size:40px 40px;padding:40px 20px;font-family:'Roboto',sans-serif;">
      <div style="background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:480px;width:100%;">
        <!-- Header mini -->
        <div style="background:#1c1c1c;padding:14px 20px;display:flex;align-items:center;gap:12px;">
          ${logoBadge}
          <div>
            <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.01em;">
              <span style="color:#F5A623;">DURAN</span><span style="color:#fff;">TOOLS</span>
            </div>
            <div style="font-size:6.5px;color:#999;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;">Herramientas a tu alcance</div>
          </div>
        </div>
        <div style="height:8px;background:repeating-linear-gradient(-55deg,#F5A623 0,#F5A623 10px,#1c1c1c 10px,#1c1c1c 20px);"></div>

        <!-- Contenido -->
        <div style="padding:28px 28px 32px;">
          <div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:#1c1c1c;margin-bottom:6px;">
            ✅ CSV cargado correctamente
          </div>
          <div style="font-size:12px;color:#888;margin-bottom:24px;">
            ${filas.length - 1} productos encontrados. Selecciona qué precio quieres mostrar en el catálogo:
          </div>

          <div style="display:flex;flex-direction:column;gap:10px;" id="btnPrecio">
            ${todosLosPrecios.map(p => `
              <button onclick="generarCatalogo('${p.key}')"
                style="background:#1c1c1c;color:#fff;border:none;border-radius:6px;padding:13px 18px;
                  font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.05em;
                  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
                  transition:background .15s;"
                onmouseover="this.style.background='#F5A623';this.style.color='#1c1c1c';"
                onmouseout="this.style.background='#1c1c1c';this.style.color='#fff';">
                <span>🏷 ${p.label}</span>
                <span style="font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.1em;">${p.key}</span>
              </button>`).join('')}
          </div>

          <!-- Botón catálogo sin precio -->
          <div style="margin-top:14px;">
            <button onclick="generarCatalogo('__SIN_PRECIO__')"
              style="width:100%;background:#444;color:#fff;border:none;border-radius:6px;padding:13px 18px;
                font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.05em;
                cursor:pointer;display:flex;align-items:center;justify-content:space-between;
                transition:background .15s;"
              onmouseover="this.style.background='#666';"
              onmouseout="this.style.background='#444';">
              <span>🚫 Sin precio</span>
              <span style="font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.1em;">ocultar precio</span>
            </button>
          </div>

          <div style="margin-top:20px;border-top:1px solid #eee;padding-top:16px;text-align:center;">
            <label style="font-size:11px;color:#aaa;cursor:pointer;text-decoration:underline;">
              ↩ Cargar otro CSV
              <input type="file" accept=".csv" style="display:none;" onchange="handleFile(event)">
            </label>
          </div>
        </div>
      </div>
    </div>`;
}

// ── PASO 2: generar catálogo con el precio elegido ─────────────────
let _precioKeyActual = "";
function generarCatalogo(precioKey) {
  _precioKeyActual = precioKey;
  const csvData = csvDataGlobal;
  const filas = csvData.replace(/^\uFEFF/, '').split(/\r?\n/).filter(f => f.trim() !== '');
  const primeraLinea = filas[0];
  const sep = (primeraLinea.match(/;/g)||[]).length > (primeraLinea.match(/,/g)||[]).length ? ';' : ',';
  const encabezados = parsearCSVRobusto(primeraLinea, sep).map(h => h.trim().toLowerCase());

  let iId  = encabezados.findIndex(h => h.includes('id producto') || h.includes('id_no_editar'));
  let iNom = encabezados.findIndex(h => h.includes('nombre'));
  let iRef = encabezados.findIndex(h => h.includes('referencia'));
  let iPre = encabezados.findIndex(h => h.includes(precioKey));
  let iImg = encabezados.findIndex(h => h.includes('imagen') || h.includes('url') || h.includes('foto'));
  let iCat = encabezados.findIndex(h => h.includes('categoria') || h.includes('categoría') || h.includes('category'));
  let iOrd = encabezados.findIndex(h => h === 'orden' || h === 'order');

  if (iId===-1) iId=1; if (iNom===-1) iNom=2; if (iRef===-1) iRef=5; if (iPre===-1) iPre=11;

  const ORDEN_CATS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','Ñ','O','P'];
  const NOMBRES_CATS = {
    'A': 'HERRAMIENTA MANUAL',
    'B': 'ACCESORIOS PARA HERRAMIENTAS',
    'C': 'HERRAMIENTA AUTOMOTRIZ',
    'D': 'ILUMINACION',
    'E': 'ELECTRICIDAD,CABLES Y ALAMBRES',
    'F': 'AGRO',
    'G': 'PEGAMENTOS Y AHDESIVOS',
    'H': 'PINTURAS Y APLICACIÓN',
    'I': 'HERRAJES Y ACCESORIOS',
    'J': 'GRAMERAS',
    'K': 'PLOMERIA Y ACCESORIOS',
    'L': 'ACCESORIOS PARA EL HOGAR',
    'M': 'HERRAJES Y HERRAMIENTAS PARA VIDRIO Y ALUMINIO',
    'N': 'SEGURIDAD INDUSTRIAL.',
    'Ñ': 'SEGURIDAD Y ACCESORIOS',
    'O': 'ACCESORIOS MOTO Y BICICLETA',
    'P': 'General',
  };

  const productos = [];
  for (let i = 1; i < filas.length; i++) {
    const cols = parsearCSVRobusto(filas[i], sep);
    if (cols.length <= iNom || !cols[iNom]) continue;
    let pRaw = (cols[iPre] || '').toLowerCase().replace('null','').replace(/[$\s]/g,'').trim();
    let precioFormateado = '0';
    if (precioKey !== '__SIN_PRECIO__' && pRaw !== '') {
      let valorLimpio = pRaw.trim().replace(/\./g,'').replace(',','.');
      let valorNumerico = parseFloat(valorLimpio);
      if (!isNaN(valorNumerico)) {
        valorNumerico = Math.round(valorNumerico / 100) * 100;
        precioFormateado = valorNumerico.toLocaleString('es-CO');
      } else {
        precioFormateado = pRaw;
      }
    }
    let rawImg = cols[iImg] || '';
    if (rawImg.trim() !== '' && !isNaN(rawImg.trim())) rawImg = '';
    const orden = iOrd !== -1 ? (cols[iOrd]||'').trim().toUpperCase() : '';
    const categoria = iCat !== -1 ? (cols[iCat]||'').trim() : '';
    productos.push({ id: cols[iId]||'', nombre: cols[iNom]||'', referencia: cols[iRef]||'',
      precio: precioFormateado, imagenUrl: rawImg.trim(), orden, categoria });
  }

  const tieneCategoria = iOrd !== -1 || iCat !== -1;

  // Mapa inverso: nombre completo -> letra de orden
  const NOMBRE_A_ORDEN = {};
  for (const [letra, nombre] of Object.entries(NOMBRES_CATS)) {
    NOMBRE_A_ORDEN[nombre.toUpperCase()] = letra;
  }

  // Normaliza texto: quita tildes, puntos, espacios extra y pasa a mayúsculas
  function normCat(s) {
    return (s||'').toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[.,]/g,'').replace(/\s+/g,' ').trim();
  }
  // Mapa inverso normalizado
  const NOMBRE_A_ORDEN_NORM = {};
  for (const [letra, nombre] of Object.entries(NOMBRES_CATS)) {
    NOMBRE_A_ORDEN_NORM[normCat(nombre)] = letra;
  }

  function obtenerLetraOrden(p) {
    // 1. Columna Orden con letra directa (A, B, C...)
    if (p.orden && ORDEN_CATS.includes(p.orden)) return p.orden;
    // 2. Columna Orden con nombre completo (normalizado)
    if (p.orden) { const l = NOMBRE_A_ORDEN_NORM[normCat(p.orden)]; if (l) return l; }
    // 3. Columna Categoria con nombre completo (normalizado)
    if (p.categoria) { const l = NOMBRE_A_ORDEN_NORM[normCat(p.categoria)]; if (l) return l; }
    // 4. Categoría desconocida -> al final
    return null;
  }

  if (tieneCategoria) {
    // Paso 1: asignar letra de orden a todos primero
    for (const p of productos) {
      p._ordenResuelto = obtenerLetraOrden(p) || (p.orden || p.categoria || '?');
    }
    // Paso 2: ordenar por categoría y dentro de cada categoría A-Z por nombre
    productos.sort((a, b) => {
      const ia = ORDEN_CATS.indexOf(a._ordenResuelto) !== -1 ? ORDEN_CATS.indexOf(a._ordenResuelto) : 999;
      const ib = ORDEN_CATS.indexOf(b._ordenResuelto) !== -1 ? ORDEN_CATS.indexOf(b._ordenResuelto) : 999;
      if (ia !== ib) return ia - ib;
      // Misma categoría → A-Z por nombre
      return a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' });
    });
  } else {
    // Sin categoría → solo A-Z por nombre
    productos.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));
  }

  const grupos = [];
  let grupoActual = null;
  for (const p of productos) {
    const key = p._ordenResuelto || p.orden || p.categoria || '__SIN_CAT__';
    if (!grupoActual || grupoActual.key !== key) {
      grupoActual = { key, items: [] };
      grupos.push(grupoActual);
    }
    grupoActual.items.push(p);
  }

  const LOGO_SRC = document.querySelector('.logo-badge img')?.src || '';
  const logoTag = `<div class="logo-badge"><img src="${LOGO_SRC}" style="width:100%;height:100%;object-fit:contain;"></div>`;

  // ── Paginación continua: sin huecos entre categorías ──────────────
  // Todos los productos en flujo seguido; solo la última página se rellena.
  const totalPaginas = Math.ceil(productos.length / PRODUCTOS_POR_PAGINA);

  let finalHTML = '';
  let numPag = 0;

  function crearPagina(cardsHTML, catHeader) {
    numPag++;
    const divCat = catHeader
      ? `<div class="section-divider"><span class="orden-pill">${escaparHTML(catHeader.orden)}</span><span class="cat-name">${escaparHTML(catHeader.nombre)}</span></div>`
      : '';
    return `
      <div class="page">
        <div class="header"><div class="header-content"><div class="logo-area">${logoTag}<div class="brand-text"><div class="name"><span class="duran">DURAN</span><span class="tools">TOOLS</span></div><div class="tagline">Herramientas a tu alcance</div></div></div><div class="header-divider"></div><div class="catalog-title">Catálogo de Productos</div><div class="year-pill">2026</div></div><div class="hazard-stripe"></div></div>
        ${divCat}
        <div class="grid-area"><div class="grid">${cardsHTML}</div></div>
        <div class="footer"><span class="footer-line"></span><span class="footer-text"><strong>DURANTOOLS</strong> Herramientas a tu alcance</span><span class="footer-line"></span><span class="footer-text" style="margin-left:12px;">Pág. <strong>${numPag}</strong> / <strong>${totalPaginas}</strong></span></div>
      </div>`;
  }

  // ── Flujo continuo: sin huecos, categoría indicada en esquina ──
  for (let pag = 0; pag < totalPaginas; pag++) {
    const inicio = pag * PRODUCTOS_POR_PAGINA;
    let prodsPag = productos.slice(inicio, inicio + PRODUCTOS_POR_PAGINA);

    let cardsHTML = prodsPag.map(crearTarjetaProducto).join('');
    // Rellenar solo la última página
    if (pag === totalPaginas - 1) {
      while (prodsPag.length < PRODUCTOS_POR_PAGINA) { cardsHTML += crearTarjetaVacia(); prodsPag.push(null); }
    }

    // Mostrar categoría del primer producto de la página en el divisor
    let catHeader = null;
    if (tieneCategoria && prodsPag[0]) {
      const keyActual = prodsPag[0]._ordenResuelto || prodsPag[0].orden || prodsPag[0].categoria || '';
      if (keyActual) {
        catHeader = { orden: keyActual, nombre: NOMBRES_CATS[keyActual] || prodsPag[0].categoria || keyActual };
      }
    }

    finalHTML += crearPagina(cardsHTML, catHeader);
  }

  document.body.innerHTML = finalHTML || '<h1>No se encontraron productos.</h1>';

  // Reinyectar botón PDF y overlay después de reemplazar el body
  const _btnPDF = document.createElement('button');
  _btnPDF.id = 'btn-exportar-pdf';
  _btnPDF.onclick = exportarPDF;
  _btnPDF.innerHTML = '&#11015; Descargar PDF Optimizado';
  _btnPDF.style.cssText = `
    position:fixed;bottom:28px;right:28px;z-index:9999;
    background:#F5A623;color:#1c1c1c;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;
    letter-spacing:.06em;padding:14px 26px;border:none;border-radius:8px;
    cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.35);
    display:flex;align-items:center;gap:10px;`;
  _btnPDF.onmouseover = () => { _btnPDF.style.background='#e09410'; _btnPDF.style.transform='translateY(-2px)'; };
  _btnPDF.onmouseout  = () => { _btnPDF.style.background='#F5A623'; _btnPDF.style.transform='none'; };
  document.body.appendChild(_btnPDF);

  const _overlay = document.createElement('div');
  _overlay.id = 'pdf-overlay';
  _overlay.style.cssText = `
    display:none;position:fixed;inset:0;z-index:99999;
    background:rgba(28,28,28,.82);align-items:center;justify-content:center;
    flex-direction:column;gap:18px;font-family:'Oswald',sans-serif;color:#fff;`;
  _overlay.innerHTML = `
    <div style="font-size:22px;font-weight:700;letter-spacing:.08em;">Generando PDF...</div>
    <div style="width:320px;height:10px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;">
      <div id="pdf-progress-bar" style="height:100%;width:0%;background:#F5A623;border-radius:5px;transition:width .2s;"></div>
    </div>
    <div id="pdf-status" style="font-size:14px;color:#ccc;letter-spacing:.05em;">Procesando...</div>
    <div style="font-size:11px;color:#aaa;margin-top:4px;">No cierres esta pestaña</div>`;
  document.body.appendChild(_overlay);
}

function handleFile(e) {
  const f = e.target.files[0];
  if (f) { const l = new FileReader(); l.onload = ev => leerCSVYMostrarSelector(ev.target.result); l.readAsText(f, 'UTF-8'); }
}

document.getElementById('csvFileInput').addEventListener('change', handleFile);
</script>

  <div style="font-size:22px;font-weight:700;letter-spacing:.08em;">Generando PDF...</div>
  <div id="pdf-progress-bar-wrap"><div id="pdf-progress-bar"></div></div>
  <div id="pdf-status">Procesando página 1...</div>
  <div style="font-size:11px;color:#aaa;margin-top:4px;">No cierres esta pestaña</div>
</div>

<script>
// ── Convierte una imagen remota a base64 usando un proxy con CORS ──
// Esto soluciona el problema de imágenes en blanco en el PDF: el <img> se ve
// bien en pantalla porque mostrar una imagen NO requiere CORS, pero
// html2canvas SÍ necesita CORS para leer los píxeles. Si el bucket S3 no
// manda esos permisos, la imagen queda en blanco en el PDF aunque se vea
// bien en pantalla. Al convertir a base64 vía proxy, evitamos el problema.
const _cacheBase64 = new Map();

function urlAProxy(url) {
  // images.weserv.nl: proxy de imágenes gratuito que sí manda headers CORS
  const limpio = url.replace(/^https?:\/\//, '');
  return `https://images.weserv.nl/?url=${encodeURIComponent(limpio)}&output=jpg&q=82&bg=white`;
}

function imagenABase64(url) {
  if (_cacheBase64.has(url)) return Promise.resolve(_cacheBase64.get(url));
  return new Promise((resolve) => {
    const proxyUrl = urlAProxy(url);
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 7000); // máx 7s por imagen

    fetch(proxyUrl, { mode: 'cors', signal: controller.signal })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.blob(); })
      .then(blob => {
        clearTimeout(timeoutId);
        const reader = new FileReader();
        reader.onload = () => { _cacheBase64.set(url, reader.result); resolve(reader.result); };
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      })
      .catch(() => { clearTimeout(timeoutId); resolve(null); }); // Timeout o error → seguimos sin romper nada
  });
}

// Convierte las imágenes de UN contenedor (ej: una sola página) a base64
async function convertirImagenesDeContenedor(contenedor) {
  const imgs = Array.from(contenedor.querySelectorAll('img[src^="http"]'));
  if (!imgs.length) return;
  const LOTE = 6;
  for (let i = 0; i < imgs.length; i += LOTE) {
    const grupo = imgs.slice(i, i + LOTE);
    await Promise.all(grupo.map(async (img) => {
      const original = img.getAttribute('data-url-original') || img.src;
      const b64 = await imagenABase64(original);
      if (b64) img.src = b64;
    }));
  }
}

// Convierte TODAS las imágenes del documento a base64 antes de capturar el PDF
async function convertirImagenesABase64(status) {
  const imgs = Array.from(document.querySelectorAll('.page img[src^="http"]'));
  const total = imgs.length;
  let listas = 0;
  if (total === 0) return;

  // Procesar en lotes para no saturar la red de golpe
  const LOTE = 6;
  for (let i = 0; i < imgs.length; i += LOTE) {
    const grupo = imgs.slice(i, i + LOTE);
    await Promise.all(grupo.map(async (img) => {
      const original = img.getAttribute('data-url-original') || img.src;
      const b64 = await imagenABase64(original);
      if (b64) img.src = b64; // Si falla, deja la imagen como estaba (se intentará igual)
      listas++;
      if (status) status.textContent = `Optimizando imágenes para el PDF: ${listas}/${total}...`;
    }));
  }
}

// ── EXPORTAR PDF OPTIMIZADO ─────────────────────────────────────────
async function exportarPDF() {
  const paginas = document.querySelectorAll('.page');
  if (!paginas.length) { alert('Primero genera el catálogo cargando tu CSV.'); return; }

  // Verificar que las librerías están cargadas
  if (!window.jspdf || !window.html2canvas) {
    alert('⚠️ Las librerías PDF no cargaron. Verifica tu conexión a internet y recarga la página.');
    return;
  }

  const overlay = document.getElementById('pdf-overlay');
  const barFill = document.getElementById('pdf-progress-bar');
  const status  = document.getElementById('pdf-status');

  overlay.style.display = 'flex';
  status.textContent = 'Iniciando...';
  barFill.style.width = '0%';

  await new Promise(r => setTimeout(r, 100)); // dar tiempo al navegador a mostrar el overlay

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });

    const TOTAL = paginas.length;
    status.textContent = `Página 0 de ${TOTAL}`;

    for (let i = 0; i < TOTAL; i++) {
      const pct = Math.round((i / TOTAL) * 100);
      barFill.style.width = pct + '%';
      status.textContent = `Página ${i + 1} de ${TOTAL}`;

      // Convertir SOLO las imágenes de esta página (no las 1000+ de golpe)
      await convertirImagenesDeContenedor(paginas[i]);

      await new Promise(r => setTimeout(r, 50)); // pausa para no congelar

      let canvas;
      try {
        canvas = await html2canvas(paginas[i], {
          scale: 1.5,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          logging: false,
          imageTimeout: 15000,
        });
      } catch(e) {
        console.warn('Error en página ' + (i+1) + ':', e);
        status.textContent = `Página ${i+1} falló, continuando...`;
        await new Promise(r => setTimeout(r, 300));
        continue;
      }

      const imgData = canvas.toDataURL('image/jpeg', 0.55);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');

      // Liberar memoria
      canvas.width = 0;
      canvas.height = 0;
    }

    barFill.style.width = '100%';
    status.textContent = 'Guardando...';
    await new Promise(r => setTimeout(r, 300));

    pdf.save('Catalogo_DuranTools_2026.pdf');

  } catch(err) {
    console.error('Error generando PDF:', err);
    alert('❌ Error al generar el PDF: ' + err.message + '\n\nRevisa la consola (F12) para más detalles.');
  } finally {
    overlay.style.display = 'none';
  }
}

// Mostrar botón solo cuando hay páginas de catálogo generadas
function actualizarBotonPDF() {
  const btn = document.getElementById('btn-exportar-pdf');
  if (!btn) return;
  // Hay catálogo cuando existen .page Y ya no está el selector de precio
  const paginas = document.querySelectorAll('.page');
  const haySelector = document.getElementById('btnPrecio');
  const hayCatalogo = paginas.length > 0 && !haySelector;
  btn.style.display = hayCatalogo ? 'flex' : 'none';
}

const _observer = new MutationObserver(actualizarBotonPDF);
_observer.observe(document.body, { childList: true, subtree: true });
// También ocultar al cargar
actualizarBotonPDF();
